services:
  sinepilstream:
    build: .
    container_name: sinepilstream
    restart: unless-stopped
    ports:
      - "3500:3500"
    environment:
      - NODE_ENV=production
      - PORT=3500
    # Cap container memory. Node ~80MB + jsdom decrypt sandbox ~50MB. 400M
    # leaves plenty of headroom for SQLite + concurrent scrapes. If we breach,
    # Docker OOMs the container and `restart` brings it back.
    mem_limit: 400m
    volumes:
      - sinepilstream_data:/app/data   # named volume — lives in /var/lib/docker/volumes/, NOT in the project dir
      - ./logs:/app/logs

volumes:
  sinepilstream_data:
