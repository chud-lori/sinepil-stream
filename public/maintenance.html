<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>SinepilStream — Under Maintenance</title>
  <style>
    :root {
      --bg:     #0f0f13;
      --fg:     #ececff;
      --muted:  #7070a0;
      --accent: #e50914;
      --card:   #181822;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: var(--card);
      border-radius: 14px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(229, 9, 20, 0.12);
      border-radius: 50%;
      color: var(--accent);
    }
    .icon svg { width: 32px; height: 32px; }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }
    p:last-child { margin-bottom: 0; }
    .alt-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
    }
    .alt-link:hover { background: #c50710; }
    .alt-link:active { transform: scale(0.97); }
    .alt-hint {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
    .brand {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .brand .name { color: var(--fg); font-weight: 600; }
  </style>
</head>
<body>
  <main class="card" role="alert" aria-live="polite">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <h1>We&rsquo;re under maintenance</h1>
    <p>SinepilStream is temporarily offline while we make some improvements.</p>
    <p>We&rsquo;ll be back shortly. Thanks for your patience.</p>
    <p class="alt-hint">In the meantime, try one of our other apps:</p>
    <a class="alt-link" href="https://c.lori.my.id/" target="_blank" rel="noopener">Open c.lori.my.id &rarr;</a>
    <div class="brand"><span class="name">SinepilStream</span></div>
  </main>
</body>
</html>
